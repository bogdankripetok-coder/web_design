<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevPolio | Contacts</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
        body { background-color: #FFB6BA; color: #000000; min-height: 100vh; display: flex; flex-direction: column; }
        header { background-color: #FFB6C8; padding: 20px 50px; display: flex; justify-content: flex-end; }
        nav { display: flex; gap: 30px; }
        nav a { text-decoration: none; color: #000000; font-size: 18px; font-weight: 500; padding: 5px 10px; transition: all 0.3s ease; border-bottom: 2px solid transparent;}
        nav a:hover, nav a.active { color: #bd1e51; border-bottom: 2px solid #000000; }
        
        .back-arrow { position: absolute; top: 90px; right: 40px; text-decoration: none; color: #000000; font-size: 24px; }

        .contacts-container {
            max-width: 1200px;
            width: 100%;
            margin: auto;
            padding: 0 20px;
            display: grid;
            grid-template-columns: 1fr 1.3fr;
            gap: 60px;
            align-items: center;
        }

        .contacts-img-box img {
            width: 100%;
            max-width: 380px;
            border-radius: 4px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }

        .contacts-info-box h2 {
            font-size: 48px;
            font-weight: 500;
            margin-bottom: 30px;
        }

        .contacts-list {
            background-color: #FFB6C8;
            padding: 30px;
            border-radius: 4px;
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 20px;
            font-size: 18px;
        }

        .contacts-list li {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .contacts-list i {
            font-size: 22px;
            width: 30px;
            text-align: center;
        }

        .contacts-list a {
            color: #000000;
            text-decoration: none;
            transition: color 0.2s;
        }

        .contacts-list a:hover {
            color: #ffffff;
        }

        @media (max-width: 768px) {
            .contacts-container { grid-template-columns: 1fr; text-align: center; margin: 40px auto; }
            .contacts-img-box img { margin: 0 auto; }
        }
    </style>
</head>
<body>

    <header>
        <nav>
            <a href="lab13.html">About me</a>
            <a href="portfolio.html">Portfolio</a>
            <a href="contacts.html" class="active">Contacts</a>
        </nav>
    </header>

    <a href="lab13.html" class="back-arrow">↩</a>

            <img src="smiling_guy.jpg" alt="Contact Section Photo">
        </div>

            <h2>Contacts:</h2>
            <ul class="contacts-list">

                    <i class="fa-regular fa-envelope"></i>
                    <span>email: <a href="mailto:bohdan.pyryzhok.25@cnu.edu.ua">bohdan.pyryzhok.25@cnu.edu.ua</a></span>
                </li>
                <li>
                    <i class="fa-solid fa-phone"></i>
                    <span>phone: <a href="tel:0935233731">0935233731</a></span>
                </li>
                <li>
                    <i class="fa-brands fa-telegram"></i>
                    <span>telegram: <a href="https://t.me/Bohdan_9277" target="_blank">Bohdan_9277</a></span>
                </li>
                <li>
                    <i class="fa-brands fa-instagram"></i>
                    <span>instagram: <a href="https://instagram.com/Bohdan_9277" target="_blank">Bohdan_9277</a></span>
                </li>
            </ul>
        </div>
    </main>

</body>
</html>
